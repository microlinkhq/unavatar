# fly.toml app configuration file generated for enrich-unavatar on 2026-05-31T10:06:38Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'enrich-unavatar'
primary_region = 'dfw'
kill_signal = 'SIGTERM'
kill_timeout = '5s'

[build]

# Override unavatar's built-in per-IP rate limiter (src/constant.js defaults:
# RATE_LIMIT=50 / RATE_LIMIT_WINDOW=86400s). Lifted high so a first-load of a big
# client list from a single Vercel egress IP doesn't hit the 429 cliff.
[env]
  RATE_LIMIT = "100000000"
  RATE_LIMIT_WINDOW = "86400"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 4
    soft_limit = 2

[[restart]]
  policy = 'on-failure'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
